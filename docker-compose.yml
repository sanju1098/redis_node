services:
  redis:
    image: redis:7-alpine
    container_name: redis-node
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7
    container_name: mongodb-node
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: redis_mongo_db
    volumes:
      - mongo_data:/data/db

volumes:
  redis_data:
  mongo_data:
